<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>高校争议人物资料库</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <span class="brand-mark">档</span>
          <span>高校争议人物资料库</span>
        </div>
        <a class="source-link" href="../controversial-alumni-soft-ranking-2026.md">Markdown 原档</a>
      </div>
    </header>
    <main class="shell">
      <header class="hero">
        <div class="hero-grid">
          <div>
            <p class="eyebrow">2026 软科前十高校，剔除武汉大学 · 网站展示已过滤为负面主体</p>
            <h1>按人物浏览，点击查看事件证据</h1>
          </div>
          <section class="metrics" aria-label="统计">
            <div>
              <span id="sourceEntries">-</span>
              <p>原始记录</p>
            </div>
            <div>
              <span id="totalEntries">-</span>
              <p>展示人物</p>
            </div>
            <div>
              <span id="visibleEntries">-</span>
              <p>当前筛选</p>
            </div>
            <div>
              <span id="archiveCount">-</span>
              <p>搜索归档</p>
            </div>
          </section>
        </div>
      </header>

      <div class="workspace">
        <aside class="sidebar" aria-label="筛选和学校">
          <section class="panel controls" aria-label="筛选">
            <label class="search-field">
              <span>关键词</span>
              <input id="searchInput" type="search" placeholder="姓名、学校、事件、来源关键词" />
            </label>
            <label>
              <span>学校</span>
              <select id="schoolFilter">
                <option value="">全部学校</option>
              </select>
            </label>
            <label>
              <span>事件性质</span>
              <select id="natureFilter">
                <option value="">全部性质</option>
              </select>
            </label>
            <label>
              <span>可信度</span>
              <select id="credibilityFilter">
                <option value="">全部</option>
                <option value="较强">较强</option>
                <option value="需核验">需核验</option>
                <option value="候选待补强">候选待补强</option>
              </select>
            </label>
            <button id="resetFilters" type="button">清空筛选</button>
          </section>

          <section class="school-strip" id="schoolStrip" aria-label="学校筛选"></section>
        </aside>

        <section class="feed">
          <section class="results-head">
            <div>
              <h2>负面人物卡片</h2>
              <p>卡片只显示人物、学校和事件标题；详情页展示时间、来源、照片页和论文链接。</p>
            </div>
          </section>

          <section id="cards" class="cards" aria-label="人物卡片"></section>

          <section class="archive-panel" aria-label="本地搜索归档">
            <h2>本地搜索归档</h2>
            <div id="archiveList" class="archive-list"></div>
          </section>
        </section>
      </div>
    </main>

    <dialog id="detailDialog" class="detail-dialog">
      <article class="detail-sheet">
        <button id="closeDialog" class="icon-button" type="button" aria-label="关闭">×</button>
        <div id="dialogContent"></div>
      </article>
    </dialog>

    <script type="module" src="./app.js"></script>
  </body>
</html>
